openapi: 3.0.3
info:
  title: Order Service API
  description: Order management service for ShopApp - handles order creation, tracking, and status updates
  version: 1.0.0
  contact:
    name: ShopApp Team

servers:
  - url: http://localhost:3002
    description: Local development
  - url: http://shopapp-alb-1013507396.ap-southeast-1.elb.amazonaws.com
    description: AWS Production

tags:
  - name: Health
    description: Service health check
  - name: Orders
    description: Order management operations

paths:
  /api/orders/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the order service
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  service:
                    type: string
                    example: order-service
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time

  /api/orders:
    post:
      tags:
        - Orders
      summary: Create a new order
      description: Creates a new order with stock reservation via Product Service and sends notification via SQS
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
            example:
              items:
                - productId: "prod-001"
                  quantity: 2
                - productId: "prod-002"
                  quantity: 1
              shippingAddress:
                street: "123 Main Street"
                city: "Colombo"
                postalCode: "10100"
                country: "Sri Lanka"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Validation error or insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieves a specific order by its order ID. Users can only view their own orders.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The order ID (e.g., ORD-20260326-001)
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Unauthorized to view this order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Orders
      summary: Cancel an order
      description: Cancels an order and releases reserved stock
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The order ID
          schema:
            type: string
      responses:
        "200":
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/orders/{id}/status:
    put:
      tags:
        - Orders
      summary: Update order status
      description: Updates the status of an order. Triggers SQS notifications for SHIPPED, DELIVERED, and CANCELLED statuses.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The order ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
            example:
              status: "SHIPPED"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/orders/user/{userId}:
    get:
      tags:
        - Orders
      summary: Get all orders for a user
      description: Retrieves all orders for a specific user, sorted by creation date (newest first). Users can only view their own orders.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: The user ID
          schema:
            type: string
      responses:
        "200":
          description: List of user orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Unauthorized to view these orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from User Service login

  schemas:
    CreateOrderRequest:
      type: object
      required:
        - items
        - shippingAddress
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: string
                description: Product ID from Product Service
              quantity:
                type: integer
                minimum: 1
                description: Quantity to order
        shippingAddress:
          type: object
          required:
            - street
            - city
            - postalCode
            - country
          properties:
            street:
              type: string
            city:
              type: string
            postalCode:
              type: string
            country:
              type: string

    UpdateStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - PENDING
            - CONFIRMED
            - PROCESSING
            - SHIPPED
            - DELIVERED
            - CANCELLED

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          example: ORD-20260326-001
        userId:
          type: string
        userEmail:
          type: string
          format: email
        totalAmount:
          type: number
          format: decimal
          example: 2500.00
        status:
          type: string
          enum:
            - PENDING
            - CONFIRMED
            - PROCESSING
            - SHIPPED
            - DELIVERED
            - CANCELLED
        paymentStatus:
          type: string
          enum:
            - PENDING
            - PAID
            - FAILED
        shippingAddress:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            postalCode:
              type: string
            country:
              type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
        name:
          type: string
        price:
          type: number
          format: decimal
        quantity:
          type: integer
        totalPrice:
          type: number
          format: decimal

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Error message
